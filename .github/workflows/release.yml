name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for manual runs only"
        required: false
        default: "manual"

permissions:
  contents: write

jobs:
  release:
    name: Build release bundle
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run lint checks
        run: make lint

      - name: Run unit tests
        run: make test

      - name: Build source bundle
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="${{ inputs.version }}"
          fi

          bundle="relay-${version}"
          mkdir -p "dist/${bundle}"
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='*.env' \
            --exclude='__pycache__' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='dist/' \
            ./ "dist/${bundle}/"
          printf '%s\n' "${version}" > "dist/${bundle}/VERSION"

          tar -C dist -czf "dist/${bundle}.tar.gz" "${bundle}"
          rm -rf "dist/${bundle}"
          (cd dist && sha256sum "${bundle}.tar.gz" > SHA256SUMS)

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
