# smart-dictate configuration
#
# Deployed to ~/.config/smart-dictate/config.toml by install.sh.
# Env vars (GROQ_MODEL, GROQ_ENDPOINT, GROQ_API_KEY, REPHRASE_STYLE)
# override the values below at runtime.

[groq]
# LLM model used for both dictation cleanup and text rephrasing.
# Default: qwen/qwen3.6-27b (best speed/quality/cost trade-off on Groq).
#
# Alternatives tested on Groq (ranked):
#   1. qwen/qwen3.6-27b          (chosen) — ~0.56s, preserves terms, low cost
#   2. openai/gpt-oss-20b         —        ~0.60s, faster but slightly lossy
#   3. openai/gpt-oss-120b low    —        ~0.85s, polished, slightly verbose
#
# Other Groq models not recommended:
#   - llama-3.1-8b-instant       — drops key terms (compatibility sets, etc.)
#   - llama-3.3-70b-versatile    — drops terms, reorders content
#   - llama-4-scout              — adds fluff, slower
#   - qwen/qwen3-32b             — translates to Turkish even with English input
#   - gpt-oss-safeguard-20b      — safety-filtered, not for rephrase
#   - groq/compound-mini         — agentic, expensive, no benefit here
#   - groq/compound              — agentic, even slower
#
# Reasoning parameters (Qwen):
#   reasoning_effort = "none"   — disable reasoning (best for rephrase/dictation)
#   reasoning_effort = "default" — enable reasoning (causes think-tag pollution)
#
# Reasoning parameters (gpt-oss):
#   reasoning_effort = "low"     — recommended for dictation/rephrase
#   reasoning_effort = "medium"  — slower, similar quality
#   reasoning_effort = "high"    — slow, rate-limited, marginal benefit
#
# Examples (set via env var to override):
#   GROQ_MODEL=qwen/qwen3.6-27b
#   GROQ_MODEL=openai/gpt-oss-20b
#   GROQ_MODEL=openai/gpt-oss-120b
model = "qwen/qwen3.6-27b"

# API endpoint (change to use a different provider with OpenAI-compatible API)
endpoint = "https://api.groq.com/openai/v1/chat/completions"

# API key (optional — falls back to GROQ_API_KEY env var,
# then to ~/.config/voxtype/groq-api-key)
# api_key = "gsk_..."

[dictation]
# System prompt for ASR dictation cleanup (voxtype-clean-dictation)
system_prompt = """You are an experienced Turkish/English editor. Convert ASR/dictation output into natural, concise, grammatically correct text. Do not be word-for-word literal; preserve the speaker's intent. Fix or drop garbled ASR fragments. Do not translate. Keep technical terms, commands, file paths, and code names unchanged. PRESERVE THE ORIGINAL LANGUAGE: Turkish input -> Turkish output, English input -> English output. Output only the cleaned text."""

[rephrase]
# Model (defaults to [groq].model, override with REPHRASE_MODEL env var).
# Strong alternatives if [groq].model doesn't fit:
#   - openai/gpt-oss-20b       (fastest, ~0.6s, slightly lossy)
#   - openai/gpt-oss-120b low  (polished, ~0.85s)
model = "qwen/qwen3.6-27b"

# API endpoint (defaults to [groq].endpoint, override with REPHRASE_ENDPOINT env var)
# endpoint = "https://api.groq.com/openai/v1/chat/completions"

# System prompt for text rephrasing (voxtype-rephrase)
# Override at runtime with REPHRASE_STYLE env var
system_prompt = """You are an experienced editor. Rewrite the text to be more fluent, natural, and concise. Remove redundancy, filler, and unnecessary words while preserving ALL key information, data, technical terms, commands, file paths, and code names unchanged. The output should be substantially shorter but still complete in meaning and context. PRESERVE THE ORIGINAL LANGUAGE: if the input is in Turkish, output in Turkish; if English, output in English. Output only the rewritten text, no explanations."""

# User prompt template for text rephrasing.
# {text} is replaced with the selected text.
# user_prompt = """Rewrite this text more clearly:

# {text}"""
