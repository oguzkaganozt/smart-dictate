# VoxType configuration — deployed to ~/.config/voxtype/config.toml.
# See https://voxtype.io for full documentation of all available options.

state_file = "auto"

[hotkey]
key = "RIGHTCTRL"
modifiers = []
mode = "toggle"

[audio]
device = "default"
sample_rate = 16000
max_duration_secs = 45

[whisper]
model = "large-v3-turbo"
language = ["tr", "en"]
translate = false
gpu_device = 1
eager_processing = false
eager_chunk_secs = 3.0

[output]
mode = "clipboard"
fallback_to_clipboard = true
driver_order = ["ydotool", "clipboard"]
type_delay_ms = 0
post_output_command = "${HOME}/.local/bin/voxtype-paste-active"

[output.post_process]
command = "${HOME}/.local/bin/voxtype-clean-dictation"
timeout_ms = 6000
trim = true
fallback_on_empty = true

[output.notification]
on_recording_start = false
on_recording_stop = false
on_transcription = true

[osd]
enabled = false

[vad]
enabled = true
threshold = 0.5
min_speech_duration_ms = 250
min_silence_duration_ms = 500
max_speech_duration_s = 30
speech_pad_ms = 30
